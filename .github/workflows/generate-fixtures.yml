# One-shot workflow (v2): generate self-made public CAR fixtures on a
# GitHub-hosted macOS runner and commit them back to the repository.
#
# Fires automatically when this file (or the generator tool) is pushed, plus
# manual dispatch. Deleted again after the artifacts are collected.
name: Generate self-made public fixtures

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/generate-fixtures.yml'
      - 'tools/make_public_fixtures.py'

permissions:
  contents: write

jobs:
  generate:
    name: Build fixtures with Apple actool and commit them
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install actool-linux + Pillow (self-authored JPEG source)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e '.[all]' pillow

      - name: Toolchain identity
        run: |
          sw_vers
          xcodebuild -version
          xcrun actool --version || true

      - name: Generate self-authored source catalogs
        run: python3 tools/make_public_fixtures.py "$RUNNER_TEMP/fixture-suite"

      - name: Compile suite with Apple actool
        run: PYTHONPATH=src python3 tools/run_apple_matrix.py "$RUNNER_TEMP/fixture-suite" "$RUNNER_TEMP/apple-out"

      - name: Stage generated fixtures
        run: |
          set -e
          for case_dir in "$RUNNER_TEMP"/apple-out/*/; do
            case_name="$(basename "$case_dir")"
            out_name="$case_name"
            [ "$case_name" = "selfgen-brand" ] && out_name="selfgen-stacks"
            cp "$case_dir/Assets.car" "fixtures/${out_name}-Assets.car"
          done
          PYTHONPATH=src python3 tools/make_public_fixtures.py --emit-solidstack-demo fixtures/selfgen-solidstack-demo.car
          mkdir -p fixtures/report
          for f in fixtures/selfgen-*-Assets.car fixtures/selfgen-solidstack-demo.car; do
            base="$(basename "$f" .car)"
            xcrun assetutil --info "$f" > "fixtures/report/${base}.assetutil.json"
          done
          ls -la fixtures/

      - name: Validate fixtures (clean-room parser + Apple ground truth)
        run: |
          PYTHONPATH=src python3 - <<'PY'
          import json
          from pathlib import Path
          from actool_linux.bom import BOMStore
          from actool_linux.car import CARFile
          from actool_linux.carinfo import inspect

          cars = sorted(Path('fixtures').glob('selfgen-*.car'))
          for car_path in cars:
              info = inspect(car_path)  # clean-room parser must accept everything
              kinds = set()
              report = Path('fixtures/report') / (car_path.stem + '.assetutil.json')
              if report.is_file():
                  text = report.read_text()
                  for marker in ('AssetType',):
                      pass
              print(f'PARSE_OK {car_path} sections={len(info)}')

          car = CARFile(BOMStore.from_path('fixtures/selfgen-rich-Assets.car'))
          registry = {e.name: e.value for e in car.appearances}
          assert 'NSAppearanceNameAqua' in registry and 'NSAppearanceNameDarkAqua' in registry, registry
          print('rich registry:', json.dumps(registry, sort_keys=True))
          assert 'ImageStack' in Path('fixtures/report/selfgen-stacks-Assets.assetutil.json').read_text()
          assert 'SolidImageStack' in Path('fixtures/report/selfgen-solidstack-demo.assetutil.json').read_text()
          for probe in ('selfgen-vec-Assets', 'selfgen-ios-Assets'):
              text = Path(f'fixtures/report/{probe}.assetutil.json').read_text()
              types = sorted(set(__import__('re').findall(r'"AssetType" : "([^"]*)"', text)))
              print(probe, 'Apple assetutil AssetTypes:', types)
              assert types, probe
          print('FIXTURE_VALIDATION_OK')
          PY

      - name: Write provenance document
        run: |
          {
            echo '# SELF-GENERATED fixtures (provenance)'
            echo
            echo "date (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "runner: $(sw_vers -productName) $(sw_vers -productVersion)"
            xcodebuild -version | sed 's/^/toolchain: /'
            echo
            echo 'All inputs were generated by tools/make_public_fixtures.py from'
            echo 'self-authored deterministic sources (no Apple/third-party artwork).'
            echo
            for f in $(ls fixtures/selfgen-*.car); do
              echo "- $f"
              echo "    sha256: $(shasum -a 256 "$f" | awk '{print $1}')"
              echo "    bytes:  $(stat -f %z "$f")"
            done
          } > fixtures/SELF-GENERATED.md
          cat fixtures/SELF-GENERATED.md

      - name: Upload fixtures as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selfgen-fixtures
          path: |
            fixtures/selfgen-*.car
            fixtures/report/
            fixtures/SELF-GENERATED.md
          retention-days: 90

      - name: Commit fixtures back to the branch
        run: |
          git config user.name 'actool-linux-fixture-bot'
          git config user.email 'actool-linux-fixture-bot@users.noreply.github.com'
          git add fixtures/
          if git diff --cached --quiet; then
            echo 'no fixture changes; skipping commit'
          else
            git commit -m "fixtures: self-made public fixtures v2 generated on GitHub-hosted macOS runner

            rich/stacks/vec/ios compiled with Apple actool from self-authored sources
            (tools/make_public_fixtures.py); solidstack demo emitted by the clean-room
            writer; Apple assetutil parse reports + provenance included."
            git push origin HEAD:actool
          fi
