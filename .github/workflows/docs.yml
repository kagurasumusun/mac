name: Documentation CI/CD & DeepWiki Auto-Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Rustdoc API Documentation
        run: cargo doc --workspace --no-deps

      - name: Prepare Pages Index Redirect & Touch .nojekyll
        run: |
          mkdir -p target/doc_site
          cp -r target/doc/* target/doc_site/
          touch target/doc_site/.nojekyll
          echo '<meta http-equiv="refresh" content="0; url=actool_rs/index.html">' > target/doc_site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Documentation Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger DeepWiki Re-indexing Ping
        run: |
          echo "Pinging DeepWiki re-indexing engine for kagurasumusun/Apple-Toolsets..."
          curl -s -L "https://deepwiki.com/kagurasumusun/Apple-Toolsets" -H "User-Agent: GitHub-Actions-DeepWiki-Sync/1.0" > /dev/null
          curl -s -X POST "https://deepwiki.com/api/reindex" \
            -H "Content-Type: application/json" \
            -d '{"repo": "kagurasumusun/Apple-Toolsets"}' || true
